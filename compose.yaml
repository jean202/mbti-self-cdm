services:
  postgres:
    image: postgres:16-alpine
    container_name: mbti-self-cdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mbti_self_cdm
      POSTGRES_USER: mbti_self_cdm
      POSTGRES_PASSWORD: mbti_self_cdm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U mbti_self_cdm -d mbti_self_cdm',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: mbti-self-cdm-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
